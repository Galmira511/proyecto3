{% extends "base.html" %}

{% block contenido %}
    <h1>Iniciar sesión</h1>

    <!-- method POST envía los datos a la ruta /login en app.py -->
    <form method="POST" action="/login">

        <div class="campo">
            <label for="email">Email</label>
            <input type="email" id="email" name="email"       <!-- name="email" coincide con request.form["email"] en app.py -->
                placeholder="tucorreo@email.com" required>
        </div>

        <div class="campo">
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena"   <!-- type=password oculta el texto -->
                placeholder="Tu contraseña" required>
        </div>

        <button type="submit">Entrar</button>

    </form>

    <p class="link-alterno">¿No tienes cuenta? 
        <a href="/registro">Regístrate aquí</a>
    </p>

{% endblock %}
